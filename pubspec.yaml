name: sungoods
description: "Sungoods is an online shopping app"

publish_to: 'none'

version: 1.0.4+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  badges: ^3.1.2
  http: ^1.6.0
  flutter_html: ^3.0.0-beta.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  share_plus: ^7.0.2
  uuid: ^4.3.3
  pdf: ^3.11.1
  printing: ^5.13.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/sungoods.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/product/
    - assets/images/slider/